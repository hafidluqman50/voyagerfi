[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"

[rpc_endpoints]
og_galileo = "${OG_GALILEO_RPC_URL}"
og_mainnet = "${OG_RPC_URL}"

[etherscan]
og_galileo = { key = "PLACEHOLDER", url = "https://chainscan-galileo.0g.ai/open/api" }
og_mainnet = { key = "PLACEHOLDER", url = "https://chainscan.0g.ai/open/api" }
